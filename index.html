<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Arial Black',sans-serif;}
canvas{display:block;border-radius:4px;box-shadow:0 0 30px rgba(0,150,255,0.4);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
const W=cv.width=320, H=cv.height=480;

// ── Supabase ──────────────────────────────────
const SUPABASE_URL='https://emzuxodajvrwnlvkbplx.supabase.co';
const SUPABASE_KEY='sb_publishable_9A2ovSMMvsVQJH8Xgfx_rA_7KmPP6K4';
async function saveScore(name,sc){
  try{await fetch(`${SB_URL}/rest/v1/shaft_scores`,{method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
    body:JSON.stringify({user_name:name,score:sc})});}catch(e){}
}
async function getRanking(){
  try{const r=await fetch(`${SB_URL}/rest/v1/shaft_scores?select=user_name,score&order=score.desc&limit=10`,
    {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    return await r.json();}catch(e){return [];}
}

// ── Audio ─────────────────────────────────────
const AC=new AudioContext();
function beep(f,t,d,type='square',v=0.1){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);
  o.start(t);o.stop(t+d);
}
function seLand(){beep(220,AC.currentTime,0.05,'sine',0.08);}
function seHit(){beep(150,AC.currentTime,0.1,'sawtooth',0.15);beep(80,AC.currentTime+0.05,0.1,'sawtooth',0.1);}
function seDead(){[300,240,180,120,80].forEach((f,i)=>beep(f,AC.currentTime+i*0.09,0.08,'sawtooth',0.12));}
function seBest(){[523,659,784,1047].forEach((f,i)=>beep(f,AC.currentTime+i*0.08,0.1,'triangle',0.1));}
let bgmId=null;
function bgmPlay(){
  const t=AC.currentTime;
  [392,330,294,330,392,392,330,330,392,494,392,330,294,330,392,0]
    .forEach((f,i)=>{if(f)beep(f,t+i*0.15,0.12,'triangle',0.05);});
  [196,196,147,147,196,196,147,196,247,196,147,196,147,196,196,196]
    .forEach((f,i)=>{if(f)beep(f,t+i*0.15,0.13,'sine',0.04);});
}
function bgmStart(){bgmStop();bgmPlay();bgmId=setInterval(bgmPlay,16*0.15*1000);}
function bgmStop(){clearInterval(bgmId);bgmId=null;}

// ── Constants ────────────────────────────────
const FH=14, PW=26, PH=34, SH=12, HPMAX=3;

// ── State ────────────────────────────────────
// screen: 'title' | 'name' | 'play' | 'dead' | 'rank'
let screen='title';
let score=0, best=0, frame=0;
let floors=[], parts=[];
let hp=HPMAX;
let raf=null;
let isNewBest=false;
let rankData=[];
let playerName=localStorage.getItem('dbs_name')||'';

const P={x:W/2,y:220,vx:0,vy:0,onFloor:false,floor:null,inv:0};

function diff(){
  const lv=Math.floor(score/15);
  return{
    spd:Math.min(1.0+lv*0.18,4.0),
    wMin:Math.max(80-lv*5,40),
    wMax:Math.max(170-lv*6,65),
    spikeRate:Math.min(0.1+lv*0.013,0.3),
    gap:Math.max(34,52-lv*2),
  };
}

// ── Init ─────────────────────────────────────
function initGame(){
  floors=[];parts=[];
  Object.assign(P,{x:W/2,y:220,vx:0,vy:0,onFloor:false,floor:null,inv:0});
  hp=HPMAX;score=0;frame=0;isNewBest=false;
  // 初期床
  for(let i=0;i<9;i++) addFloor(80+i*50, i===0);
  floors[0]={x:W/2-55,y:260,w:110,h:FH,type:'normal'};
}

function addFloor(y,init=false){
  const d=diff();
  const w=d.wMin+Math.random()*(d.wMax-d.wMin);
  const x=14+Math.random()*(W-28-w);
  const type=(!init&&Math.random()<d.spikeRate)?'spike':'normal';
  floors.push({x,y,w,h:FH,type});
}

// ── Input ────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(AC.state==='suspended')AC.resume();
  keys[e.code]=true;
  if(screen==='name'){
    if(e.code==='Enter'&&playerName.trim()){confirmName();}
    else if(e.code==='Backspace'){playerName=playerName.slice(0,-1);}
    else if(e.key.length===1&&playerName.length<12){playerName+=e.key;}
    return;
  }
  if(screen==='rank')return;
  if(screen==='title'||screen==='dead'){
    if(!playerName.trim()){screen='name';}
    else{startPlay();}
  }
});
window.addEventListener('keyup',e=>keys[e.code]=false);

cv.addEventListener('click',e=>{
  if(AC.state==='suspended')AC.resume();
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width);
  const my=(e.clientY-r.top)*(H/r.height);
  handleClick(mx,my);
});

function handleClick(mx,my){
  if(screen==='rank'){
    // CLOSE: y=430~460, x=100~220
    if(mx>=100&&mx<=220&&my>=430&&my<=460){goBack();} return;
  }
  if(screen==='name'){
    // CONFIRM: y=340~376
    if(mx>=80&&mx<=240&&my>=340&&my<=376&&playerName.trim()){confirmName();} return;
  }
  if(screen==='title'){
    // START: y=360~396
    if(mx>=80&&mx<=240&&my>=360&&my<=396){
      if(!playerName.trim()){screen='name';}else{startPlay();} return;
    }
    // RANKING: y=404~434
    if(mx>=80&&mx<=240&&my>=404&&my<=434){openRank();return;}
    return;
  }
  if(screen==='dead'){
    // RETRY: y=320~356
    if(mx>=85&&mx<=235&&my>=320&&my<=356){
      if(!playerName.trim()){screen='name';}else{startPlay();} return;
    }
    // RANKING: y=364~394
    if(mx>=85&&mx<=235&&my>=364&&my<=394){openRank();return;}
    // CHANGE NAME: y=402~418
    if(mx>=85&&mx<=235&&my>=402&&my<=418){
      localStorage.removeItem('dbs_name');playerName='';screen='name'; return;
    }
    return;
  }
}

function confirmName(){
  localStorage.setItem('dbs_name',playerName);
  screen='title';
}
function startPlay(){
  initGame();
  screen='play';
  bgmStart();
  cancelAnimationFrame(raf);
  gameLoop();
}
async function openRank(){
  const prev=screen;
  screen='rank';
  rankData=await getRanking();
  cv.dataset.rankPrev=prev;
}
function goBack(){
  screen=cv.dataset.rankPrev||'title';
  if(screen==='title')drawTitle();
}

// ── Particles ────────────────────────────────
function spawnParts(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*3;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col});
  }
}

// ── Daibutsu ─────────────────────────────────
function drawDaibutsu(x,y){
  cx.save();cx.translate(x,y);
  if(P.inv>0&&Math.floor(frame/4)%2===0)cx.globalAlpha=0.3;
  const lc='#2A3A2A',fc='#F5F0E8',sc='#C8B89A',lw=1.8;
  cx.strokeStyle=lc;cx.lineWidth=lw;cx.fillStyle=fc;
  cx.beginPath();cx.moveTo(-12,0);cx.quadraticCurveTo(-14,8,0,12);
  cx.quadraticCurveTo(14,8,12,0);cx.quadraticCurveTo(10,-16,0,-20);
  cx.quadraticCurveTo(-10,-16,-12,0);cx.fill();cx.stroke();
  cx.lineWidth=lw*0.6;
  cx.beginPath();cx.moveTo(-2,-19);cx.quadraticCurveTo(-8,-6,-10,10);cx.stroke();
  cx.beginPath();cx.moveTo(2,-19);cx.quadraticCurveTo(8,-6,10,10);cx.stroke();
  cx.lineWidth=lw;
  cx.fillStyle=fc;
  cx.beginPath();cx.ellipse(-6,2,5,3,0.2,0,Math.PI*2);cx.fill();cx.stroke();
  cx.beginPath();cx.ellipse(7,-4,4,5,0.1,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle=fc;cx.beginPath();cx.roundRect(-4,-24,8,6,2);cx.fill();cx.stroke();
  cx.fillStyle=fc;cx.beginPath();cx.ellipse(0,-34,11,12,0,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle=fc;cx.beginPath();cx.ellipse(0,-47,6,7,0,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle=sc;
  [[-8,-40],[-4,-42],[0,-43],[4,-42],[8,-40],[-5,-46],[0,-48],[5,-46],[0,-52]].forEach(([hx,hy])=>{
    cx.beginPath();cx.arc(hx,hy,1.8,0,Math.PI*2);cx.fill();
    cx.strokeStyle=lc;cx.lineWidth=0.5;cx.stroke();cx.lineWidth=lw;
  });
  cx.strokeStyle=lc;cx.lineWidth=lw*0.8;
  cx.beginPath();cx.moveTo(-7,-37);cx.quadraticCurveTo(-4,-39,-1,-37);cx.stroke();
  cx.beginPath();cx.moveTo(1,-37);cx.quadraticCurveTo(5,-39,8,-37);cx.stroke();
  cx.lineWidth=lw;
  cx.beginPath();cx.ellipse(-4,-34,3,1.5,0,Math.PI,Math.PI*2);cx.stroke();
  cx.beginPath();cx.ellipse(4,-34,3,1.5,0,Math.PI,Math.PI*2);cx.stroke();
  cx.fillStyle=lc;cx.beginPath();cx.arc(-4,-35,1,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(4,-35,1,0,Math.PI*2);cx.fill();
  cx.lineWidth=lw*0.8;
  cx.beginPath();cx.moveTo(-2,-30);cx.quadraticCurveTo(0,-28,2,-30);cx.stroke();
  cx.lineWidth=lw;
  cx.beginPath();cx.moveTo(-4,-26);cx.quadraticCurveTo(0,-28,4,-26);cx.stroke();
  cx.fillStyle='#FFD700';cx.beginPath();cx.arc(0,-36,1.5,0,Math.PI*2);cx.fill();
  cx.strokeStyle=lc;cx.lineWidth=lw;
  cx.beginPath();cx.moveTo(-10,-38);cx.quadraticCurveTo(-14,-35,-13,-28);cx.quadraticCurveTo(-12,-24,-8,-26);cx.stroke();
  cx.beginPath();cx.moveTo(10,-38);cx.quadraticCurveTo(14,-35,13,-28);cx.quadraticCurveTo(12,-24,8,-26);cx.stroke();
  cx.fillStyle='#D4C4A0';cx.strokeStyle='#8B7355';cx.lineWidth=lw;
  cx.beginPath();cx.ellipse(0,14,14,5,0,0,Math.PI*2);cx.fill();cx.stroke();
  cx.fillStyle='#C8B89A';
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;cx.beginPath();cx.ellipse(Math.cos(a)*10,14+Math.sin(a)*3,4,2,a,0,Math.PI*2);cx.fill();cx.stroke();}
  cx.restore();
}

// ── Draw helpers ─────────────────────────────
function drawBG(){
  const g=cx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#060818');g.addColorStop(1,'#0A1030');
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  // 壁
  cx.fillStyle='#001830';cx.fillRect(0,0,14,H);cx.fillRect(W-14,0,14,H);
  cx.fillStyle='rgba(0,150,255,0.12)';
  const wo=(frame*1|0)%32;
  for(let y=-32+wo;y<H;y+=32){cx.fillRect(0,y,14,16);cx.fillRect(W-14,y,14,16);}
  cx.strokeStyle='rgba(0,100,200,0.35)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(14,0);cx.lineTo(14,H);cx.stroke();
  cx.beginPath();cx.moveTo(W-14,0);cx.lineTo(W-14,H);cx.stroke();
}

function drawFloors(){
  floors.forEach(f=>{
    if(f.type==='spike'){
      const sg=cx.createLinearGradient(f.x,f.y,f.x,f.y+f.h);
      sg.addColorStop(0,'#C8C8D0');sg.addColorStop(1,'#88889A');
      cx.fillStyle=sg;cx.fillRect(f.x,f.y,f.w,f.h);
      cx.strokeStyle='#AAA';cx.lineWidth=1;cx.strokeRect(f.x,f.y,f.w,f.h);
      cx.fillStyle='#DD2222';
      const n=Math.floor(f.w/11);
      for(let i=0;i<n;i++){
        cx.beginPath();cx.moveTo(f.x+i*11,f.y);cx.lineTo(f.x+i*11+5.5,f.y-SH);cx.lineTo(f.x+i*11+11,f.y);cx.fill();
      }
    } else {
      const fg=cx.createLinearGradient(f.x,f.y,f.x,f.y+f.h);
      fg.addColorStop(0,'#D8D8E4');fg.addColorStop(0.4,'#B0B0C0');fg.addColorStop(1,'#787888');
      cx.fillStyle=fg;cx.fillRect(f.x,f.y,f.w,f.h);
      cx.fillStyle='rgba(255,255,255,0.5)';cx.fillRect(f.x,f.y,f.w,3);
      cx.strokeStyle='#606070';cx.lineWidth=1;cx.strokeRect(f.x,f.y,f.w,f.h);
    }
  });
}

function drawHUD(){
  cx.fillStyle='rgba(0,0,0,0.55)';cx.fillRect(0,0,W,36);
  cx.strokeStyle='rgba(0,150,255,0.25)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,36);cx.lineTo(W,36);cx.stroke();
  cx.fillStyle='#FF80CC';cx.font='bold 13px Arial Black';cx.textAlign='left';cx.textBaseline='middle';
  cx.fillText('LIFE',16,18);
  for(let i=0;i<HPMAX;i++){
    cx.globalAlpha=i<hp?1:0.18;
    cx.fillStyle='#FF3355';cx.font='18px Arial';cx.fillText('♥',56+i*22,18);
    cx.globalAlpha=1;
  }
  cx.fillStyle=isNewBest?`hsl(${frame*6%360},90%,60%)`:'#CCFF00';
  cx.font='bold 15px Arial Black';cx.textAlign='right';cx.textBaseline='middle';
  cx.fillText(`B${String(score).padStart(3,'0')}`,W-14,18);
  cx.fillStyle='rgba(0,200,255,0.35)';cx.font='8px Arial';cx.textAlign='left';
  cx.fillText(`SPD ${diff().spd.toFixed(1)}`,16,30);
}

function drawParts(){
  parts=parts.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.05;
    if(p.life<=0)return false;
    cx.save();cx.globalAlpha=p.life;cx.fillStyle=p.col;
    cx.beginPath();cx.arc(p.x,p.y,3,0,Math.PI*2);cx.fill();cx.restore();
    return true;
  });
}

function drawGame(){
  drawBG();drawFloors();drawParts();drawDaibutsu(P.x,P.y);drawHUD();
}

// ── Button helper ────────────────────────────
function btn(label,bx,by,bw,bh,fill,stroke){
  cx.fillStyle=fill;cx.beginPath();cx.roundRect(bx,by,bw,bh,8);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.15)';cx.beginPath();cx.roundRect(bx,by,bw,bh/2,8);cx.fill();
  cx.strokeStyle=stroke;cx.lineWidth=1.5;cx.beginPath();cx.roundRect(bx,by,bw,bh,8);cx.stroke();
  cx.fillStyle='white';cx.font='bold 14px Arial Black';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(label,bx+bw/2,by+bh/2);
}

// ── Screens ──────────────────────────────────
function drawTitle(){
  drawBG();
  cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(20,20,W-40,H-40);
  cx.strokeStyle='rgba(0,150,255,0.4)';cx.lineWidth=2;cx.strokeRect(20,20,W-40,H-40);
  cx.fillStyle='#FF80CC';cx.font='bold 28px Arial Black';cx.textAlign='center';cx.textBaseline='top';
  cx.shadowColor='#FF80CC';cx.shadowBlur=14;cx.fillText('DAIBUTSU',W/2,44);
  cx.fillStyle='#CCFF00';cx.fillText('SHAFT!',W/2,78);cx.shadowBlur=0;
  cx.fillStyle='rgba(255,255,255,0.45)';cx.font='10px Arial';cx.fillText('Guide the Daibutsu down the shaft!',W/2,116);
  drawDaibutsu(W/2,210);
  cx.fillStyle='rgba(255,255,255,0.5)';cx.font='11px Arial';cx.fillText('← → Arrow Keys to move',W/2,284);
  btn('▶  START',80,360,160,36,'#1A5DCC','rgba(0,150,255,0.6)');
  btn('🏆  RANKING',80,404,160,30,'#886600','rgba(255,200,0,0.4)');
  if(best>0){cx.fillStyle='rgba(255,200,0,0.6)';cx.font='10px Arial';cx.textBaseline='top';cx.fillText(`BEST: B${String(best).padStart(3,'0')}`,W/2,440);}
}

function drawName(){
  drawBG();
  cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(30,60,W-60,H-120);
  cx.strokeStyle='rgba(0,150,255,0.35)';cx.lineWidth=2;cx.strokeRect(30,60,W-60,H-120);
  cx.fillStyle='#FF80CC';cx.font='bold 16px Arial Black';cx.textAlign='center';cx.textBaseline='top';
  cx.fillText('ENTER YOUR NAME',W/2,82);
  drawDaibutsu(W/2,200);
  cx.fillStyle='rgba(255,255,255,0.12)';cx.beginPath();cx.roundRect(W/2-90,278,180,36,8);cx.fill();
  cx.strokeStyle='#CCFF00';cx.lineWidth=2;cx.stroke();
  cx.fillStyle='#CCFF00';cx.font='bold 17px Arial Black';cx.textBaseline='middle';
  cx.fillText(playerName||'...',W/2,296);
  cx.fillStyle='rgba(255,255,255,0.25)';cx.font='9px Arial';cx.textBaseline='top';
  cx.fillText('Type your name + Enter',W/2,322);
  btn('▶  CONFIRM',80,340,160,36,'#1A5DCC','rgba(0,150,255,0.5)');
}

function drawDead(){
  drawBG();
  cx.fillStyle='rgba(0,0,0,0.78)';cx.fillRect(0,0,W,H);
  cx.fillStyle='#0A0520';cx.beginPath();cx.roundRect(30,55,W-60,375,14);cx.fill();
  cx.strokeStyle='#CC2222';cx.lineWidth=3;cx.stroke();
  cx.fillStyle='#FF4444';cx.font='bold 26px Arial Black';cx.textAlign='center';cx.textBaseline='top';
  cx.shadowColor='#FF0000';cx.shadowBlur=14;cx.fillText('GAME OVER',W/2,72);cx.shadowBlur=0;
  drawDaibutsu(W/2,170);
  cx.fillStyle='#CCFF00';cx.font='bold 20px Arial Black';cx.fillText(`B${String(score).padStart(3,'0')}`,W/2,212);
  if(isNewBest){
    cx.fillStyle='#FFD700';cx.font='bold 11px Arial Black';cx.fillText('★ NEW BEST! ★',W/2,238);
  }
  cx.fillStyle='rgba(255,255,255,0.35)';cx.font='10px Arial';cx.fillText(`BEST: B${String(best).padStart(3,'0')}`,W/2,256);
  const stars=Math.min(3,Math.floor(score/10));
  cx.font='22px Arial';
  for(let i=0;i<3;i++){cx.fillStyle=i<stars?'#FFD700':'#333';cx.fillText('★',W/2-28+i*28,272);}
  btn('↺  RETRY',85,320,150,36,'#8A2020','rgba(255,80,80,0.6)');
  btn('🏆  RANKING',85,364,150,30,'#886600','rgba(255,200,0,0.5)');
  cx.fillStyle='rgba(255,255,255,0.25)';cx.font='10px Arial';cx.textBaseline='middle';
  cx.fillText('[ Change Name ]',W/2,409);
}

function drawRank(){
  drawBG();
  cx.fillStyle='rgba(0,0,0,0.72)';cx.fillRect(16,16,W-32,H-32);
  cx.strokeStyle='rgba(255,200,0,0.5)';cx.lineWidth=2;cx.strokeRect(16,16,W-32,H-32);
  cx.fillStyle='#FFD700';cx.font='bold 18px Arial Black';cx.textAlign='center';cx.textBaseline='top';
  cx.shadowColor='#FFD700';cx.shadowBlur=10;cx.fillText('🏆  RANKING',W/2,28);cx.shadowBlur=0;
  const medals=['🥇','🥈','🥉'];
  rankData.forEach((r,i)=>{
    const ry=66+i*34;
    cx.fillStyle='rgba(255,255,255,0.04)';cx.fillRect(24,ry-2,W-48,28);
    cx.fillStyle=i===0?'#FFD700':i===1?'#C8C8C8':i===2?'#CD8040':'rgba(255,255,255,0.6)';
    cx.font=`bold ${i<3?13:11}px Arial Black`;cx.textAlign='left';cx.textBaseline='middle';
    cx.fillText(`${medals[i]||`${i+1}.`}  ${r.user_name}`,30,ry+12);
    cx.textAlign='right';cx.fillText(`B${String(r.score).padStart(3,'0')}`,W-28,ry+12);
    cx.strokeStyle='rgba(255,255,255,0.07)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(24,ry+28);cx.lineTo(W-24,ry+28);cx.stroke();
  });
  if(!rankData.length){cx.fillStyle='rgba(255,255,255,0.4)';cx.font='12px Arial';cx.textAlign='center';cx.fillText('No scores yet!',W/2,120);}
  btn('✕  CLOSE',100,430,120,30,'#8A2020','rgba(255,80,80,0.4)');
}

// ── Game Loop ────────────────────────────────
function gameLoop(){
  if(screen!=='play'){raf=null;return;}
  raf=requestAnimationFrame(gameLoop);
  frame++;
  const d=diff();

  // 操作
  if(keys['ArrowLeft'])P.vx=Math.max(P.vx-0.4,-2.5);
  else if(keys['ArrowRight'])P.vx=Math.min(P.vx+0.4,2.5);
  else P.vx*=0.72;

  // 物理
  P.vy=Math.min(P.vy+0.38,12);
  P.x+=P.vx;P.y+=P.vy;

  // 壁
  if(P.x<14+PW/2){P.x=14+PW/2;P.vx*=-0.3;}
  if(P.x>W-14-PW/2){P.x=W-14-PW/2;P.vx*=-0.3;}

  // スクロール
  floors.forEach(f=>f.y-=d.spd);
  floors=floors.filter(f=>f.y>-50);
  const bot=floors.reduce((m,f)=>Math.max(m,f.y),-Infinity);
  if(bot<H+20)addFloor(bot+d.gap+Math.random()*20);

  // 床衝突
  P.onFloor=false;
  for(const f of floors){
    const inX=P.x+PW/2-5>f.x && P.x-PW/2+5<f.x+f.w;
    const foot=P.y+PH/2;
    const onTop=foot>=f.y && foot<=f.y+f.h+4 && P.vy>=0;
    if(inX&&onTop){
      P.y=f.y-PH/2;
      if(f.type==='spike'){
        P.vy=-5;
        if(P.inv<=0){
          hp--;
          P.inv=90;
          seHit();
          spawnParts(P.x,P.y,'#FF4040',10);
          if(hp<=0){doGameover();return;}
        }
      } else {
        if(P.vy!==0||!P.onFloor){
          if(P.floor!==f){
            P.floor=f;
            seLand();score++;
            if(score>best){if(!isNewBest)seBest();isNewBest=true;best=score;}
            spawnParts(P.x,P.y+PH/2,'#C8C8E0',3);
          }
        }
        P.vy=0;P.onFloor=true;
      }
      break;
    }
  }
  if(!P.onFloor)P.floor=null;
  if(P.inv>0)P.inv--;

  // 落下死
  if(P.y>H+60){doGameover();return;}

  drawGame();
}

function doGameover(){
  screen='dead';
  bgmStop();seDead();
  if(score>best){isNewBest=true;best=score;}
  if(playerName)saveScore(playerName,score);
  cancelAnimationFrame(raf);raf=null;
}

// ── Main render loop ─────────────────────────
function mainLoop(){
  requestAnimationFrame(mainLoop);
  if(screen==='play')return; // gameLoopが描画
  if(screen==='title')drawTitle();
  else if(screen==='name')drawName();
  else if(screen==='dead')drawDead();
  else if(screen==='rank')drawRank();
}

// ── Start ────────────────────────────────────
mainLoop();
</script>
